name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # deatherick/portfolio

jobs:
  # ── Job 1: Validate code before building ───────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON message files
        run: |
          echo "Validating JSON files..."
          for f in messages/*.json; do
            node -e "
              try {
                JSON.parse(require('fs').readFileSync('$f', 'utf8'));
                console.log('✓', '$f');
              } catch(e) {
                console.error('✗', '$f:', e.message);
                process.exit(1);
              }
            "
          done

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

  # ── Job 2: Build and push Docker image (only if validate passes) ───────────
  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
